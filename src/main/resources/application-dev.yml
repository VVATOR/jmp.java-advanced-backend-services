spring:
  datasource:
    url: jdbc:h2:mem:dev
    username: dev_user
    password: dev_pass
  jpa:
    properties:
      format_sql: true
    hibernate:
      ddl-auto: update
  liquibase:
    change-log: classpath:liquibase/db/changelog/dev/db.changelog-master.xml
    enabled: true
logging:
  level:
    org.springframework.security: DEBUG