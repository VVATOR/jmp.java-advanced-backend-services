syntax = "proto3";

option java_package = "com.epam.jmp.jabs.module2.task1.grpc.pingpong.proto";
option java_outer_classname = "PingPongProto";

service PingPongService {
  rpc SendMessage (PingRequest) returns (PongResponse);
}

message PingRequest {
  string message = 1;
}

message PongResponse {
  string message = 1;
}